<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Unfiltered - Core Values</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
    }

    .core-values-container {
        position: relative;
        width: 700%;
        max-width: 500px;
        height: auto;
        aspect-ratio: 1 / 1; /* Keep the square aspect ratio */
        background-color: #b3391b; /* Rich reddish-brown background */
        overflow: hidden;
        border-radius: 10px; /* Optional rounding for container */
        box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
    }

    /* Background Texture - Placeholder for canvas texture */
    .background-texture {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.1; /* Adjust opacity as needed */
        /* background-image: url('canvas-texture.png'); - Add path to texture file */
    }

    /* Top Left Logo and Elements */
    .header-group {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
    }
    .logo-container {
        display: flex;
        align-items: center;
    }
    .y-symbol {
        font-size: 36px;
        font-weight: bold;
        margin-right: 5px;
    }
    .logo-text {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .grid-lines {
        position: absolute;
        width: 200px; /* Approximate width of grid */
        height: auto;
        top: 60px; /* Adjust vertical position */
        left: 0;
        opacity: 0.3;
        /* background-image: url('grid-lines.png'); - Add path to grid file */
    }
    .star-shape {
        position: absolute;
        top: 10px; /* Adjust vertical position */
        left: -30px; /* Adjust horizontal position */
        opacity: 0.5;
        /* background-image: url('star.png'); - Add path to star file */
    }

    /* Main Core Values Sign */
    .sign-board {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70%;
        height: 70%;
        background-color: #4a1f11; /* Dark chocolate brown sign */
        border: 4px solid #c97143; /* Bronze/Copper border */
        border-radius: 8px; /* Slightly rounded corners for board */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 40px;
        box-shadow: inset 0px 2px 10px rgba(0,0,0,0.5); /* Interior shadow effect */
        z-index: 2; /* Bring sign to front */
    }

    .sign-header {
        font-family: "Georgia", serif; /* Use serif for header */
        color: white;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 30px;
        text-align: center;
    }

    .values-list {
        list-style: none;
        padding: 0;
        color: white;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .reassurance-text {
        color: white;
        font-size: 14px;
        line-height: 1.4;
        text-align: center;
        width: 90%;
    }

    /* Ribbon and Condoms (Top Right) */
    .corner-elements-tr {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 100px;
        height: 100px;
        opacity: 0.8;
        /* background-image: url('ribbon-condoms.png'); - Path to combined icon image */
    }

    /* Telephone (Bottom Right) */
    .phone-receiver {
        position: absolute;
        bottom: -20px;
        right: -20px;
        width: 100px;
        opacity: 0.9;
        transform: rotate(-15deg);
        /* background-image: url('phone-receiver.png'); - Path to receiver image */
    }

    /* Bottom Left Coins */
    .coins-bottom-left {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 30px;
        opacity: 0.7;
        /* background-image: url('coins.png'); - Path to coins image */
    }

</style>
</head>
<body>

<div class="core-values-container">
    <div class="background-texture"></div>

    <div class="header-group">
        <div class="logo-container">
            <span class="y-symbol">Y</span>
            <div class="logo-text">YOUTH<br>UNFILTERED</div>
        </div>
        </div>

    <div class="sign-board">
        <div class="sign-header">Core Values</div>
        <ul class="values-list">
            <li>• Compassion</li>
            <li>• Respect</li>
            <li>• Youth-Focused</li>
            <li>• Openness & Integrity</li>
        </ul>
        <div class="reassurance-text">
            Rest assured that these values are taken into account in every way, at all times.
        </div>
    </div>

    </div>

</body>
</html>
